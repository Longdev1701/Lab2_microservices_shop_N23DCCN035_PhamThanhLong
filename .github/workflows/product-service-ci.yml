name: Product Service CI

on:
  push:
    branches:
      - main
    paths:
      - "product-service/**"
      - ".github/workflows/product-service-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "product-service/**"
      - ".github/workflows/product-service-ci.yml"
  workflow_dispatch:

jobs:
  product-service:
    name: Validate Product Service
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: product-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: product-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Check JavaScript syntax
        shell: bash
        run: |
          node -c src/app.js
          node -c src/index.js
          node -c src/controllers/productController.js
          node -c src/routes/productRoutes.js
          node -c src/middleware/cache.js
          node -c src/middleware/productExists.js
          node -c src/middleware/upload.js
          node -c src/lib/redis.js

      - name: Load app
        env:
          DATABASE_URL: postgresql://admin:secret@localhost:5432/products_db
          DIRECT_URL: postgresql://admin:secret@localhost:5432/products_db
          SERVICE_NAME: product-service
          CLOUDINARY_CLOUD_NAME: test
          CLOUDINARY_API_KEY: test
          CLOUDINARY_API_SECRET: test
        run: node -e "require('./src/app'); console.log('product app loaded')"
